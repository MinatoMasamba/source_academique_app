name: source_academique
description: Hub de Connaissance Académique - Kinshasa 2026
version: 1.0.0+2

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management & DI
  flutter_bloc: ^8.1.6
  get_it: ^7.6.4
  equatable: ^2.0.5

  # Navigation
  go_router: ^12.1.3

  # Network & API
  dio: ^5.9.2
  dio_cookie_manager: ^3.1.1
  flutter_secure_storage: ^9.0.0
  web_socket_channel: ^2.4.0

  # Persistence (Offline Library)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & UX (Glassmorphism 2026)
  flutter_markdown: ^0.6.18
  cached_network_image: ^3.4.1
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  blur: ^3.1.0
  font_awesome_flutter: ^10.6.0

  intl: ^0.19.0
  image_picker: ^1.0.7  # Pour la sélection de photo
  
  # Features spécifiques
  #google_ml_kit: ^0.21.0
  flutter_downloader: ^1.11.6
  share_plus: ^7.2.1
  url_launcher: ^6.3.2
  infinite_scroll_pagination: ^5.1.1
  #flutter_local_notifications: ^16.3.0

  # --- RENDU DE CONTENU ACADÉMIQUE ---
  # On garde uniquement flutter_widget_from_html (le plus robuste en 2026)
  flutter_widget_from_html: ^0.17.1
  fwfh_webview: ^0.15.6
  fwfh_svg: ^0.16.1

  flutter_widget_from_html_core: ^0.17.0
  flutter_math_fork: ^0.7.2
  flutter_animate: ^4.5.2
  path_provider: ^2.1.5
  flutter_cached_pdfview: ^0.4.3
  shared_preferences: ^2.5.5
  permission_handler: ^12.0.1
  file_picker: ^11.0.1
  
  # Note : Les extensions fwfh_math et fwfh_table sont incluses 
  # ou gérées par les versions internes de flutter_widget_from_html.
  # On ne les ajoute pas séparément pour éviter l'exit code 69.

  flutter_local_notifications: ^17.0.0
  open_file: ^3.5.11
  pdfx: ^2.9.2
  flutter_launcher_icons: ^0.14.4

  
 


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_native_splash: ^2.3.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/vectors/
#  fonts:
#    - family: PlayfairDisplay
#      fonts:
#        - asset: assets/fonts/PlayfairDisplay-Italic-VariableFont_wght.ttf
#          weight: 700
#    - family: Inter
#      fonts:
#        - asset: assets/fonts/Inter-Regular.ttf
#        - asset: assets/fonts/Inter-Medium.ttf
#          weight: 500

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/mon_icon.png"

  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/mon_icon.png"